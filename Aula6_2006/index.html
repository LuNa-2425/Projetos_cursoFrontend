<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AULA 06</title>
    <link rel="stylesheet" href="CSS/style.css">
</head>
<body>
    <div class="gallery-container"> <!-- DIV principal, que centraliza todo o conteúdo-->
        <h1>Galeria de Viagens</h1> 
        
        <div class="grid">
            <!-- ITEM 1 -->
            <div class="item">
                <img src="IMG/Foz-do-Iguacu.jpg" alt="Cataratas do Iguaçu, no Paraná">
                <div class="overlay">PARANÁ</div> <!-- OVERLAY: camada de texto sobre a imagem -->
            </div>
            <!-- ITEM 2 -->
            <div class="item">
                <img src="IMG/cordilheira-dos-andes.jpg" alt="Codilheira dos Andes">
                <div class="overlay">CORDILHEIRA DOS ANDES</div>
            </div>
            <!-- ITEM 3 -->
            <div class="item">
                <img src="IMG/salar.jpg" alt="Pessoas posando no Salar de Uyuni">
                <div class="overlay">UYUNI</div>
            </div>
            <!-- ITEM 4 -->
            <div class="item">
                <img src="IMG/pascoa.jpg" alt="Estátuas de pedra na Ilha de Páscoa, no Chile">
                <div class="overlay">ILHA DE PÁSCOA</div>
            </div>
            <!-- ITEM 5 -->
            <div class="item">
                <img src="" alt="">
                <div class="overlay"></div>
            </div>
            <!-- ITEM 6 -->
            <div class="item">
                <img src="" alt="">
                <div class="overlay"></div>
            </div>
        </div>
    </div>
</body>
</html>
