<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula02</title>
    <link rel="stylesheet" href="CSS/style.css">
</head>
<body>
    <main>
        <div class="container"> <!-- CONTAINER: Wrapper usado para centralizar o cartão na página -->
            
            <div class="product-card"> <!-- Cartão de produto - Estrutura que contém: imagem, título, descrição, preço e botão de compra. -->
                <img src="IMG/telefone.png" alt="Telefone vintage"> <!-- Imagens em: https://www.pngarts.com/pt/explore/tag/objetos-vintage -->     
                <div class="card-content"> <!-- Conteúdo interno do card-->
                    <!-- <h3>Relógio Antigo</h3>
                    <p>Relogio despertador antigo prateado com números arábicos.</p> -->
                    <h3>Telefone Antigo</h3>
                    <p>Telefone vintage antigo bronze em bom estado e funcionando.</p>
                    <span class="price">R$ 750,00</span> <!--Span:  --> 
                    <a href="#" class="buy-btn">COMPRAR</a>
                </div>
            </div>

            <div class="product-card"> <!-- Cartão de produto - Estrutura que contém: imagem, título, descrição, preço e botão de compra. -->
                <img src="IMG/relogio.png" alt="Relógio Vintage"> <!-- Imagens em: https://www.pngarts.com/pt/explore/tag/objetos-vintage -->     
                <div class="card-content"> <!-- Conteúdo interno do card-->
                    <h3>Relógio Antigo</h3>
                    <p>Relogio despertador antigo prateado com números arábicos.</p>
                    <span class="price">R$ 60,00</span> <!--Span:  --> 
                    <a href="#" class="buy-btn">COMPRAR</a>
                </div>
            </div>
            <div class="product-card"> <!-- Cartão de produto - Estrutura que contém: imagem, título, descrição, preço e botão de compra. -->
                <img src="IMG/bolsa.png" alt="Bolsa de Couro"> <!-- Imagens em: https://www.pngarts.com/pt/explore/tag/objetos-vintage -->     
                <div class="card-content"> <!-- Conteúdo interno do card-->
                    <h3>Bolsa de Couro</h3>
                    <p>Bolsa maleta vintage de couro original seminova.</p>
                    <span class="price">R$ 125,00</span> <!--Span:  --> 
                    <a href="#" class="buy-btn">COMPRAR</a>
                </div>
            </div>

        </div> <!--Fechamento do container-->
    </main>
</body>
</html>
