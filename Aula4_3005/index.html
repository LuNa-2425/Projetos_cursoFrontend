<!DOCTYPE html>
<!-- AULA 4 : FORMULÁRIOS
 Criar formulário responsivo -->
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulários</title>
    <link rel="stylesheet" href="CSS/style.css">
</head>
<body>
    <div class="form-wrapper"> <!--WRAPPER do formulário. Div que centraliza e etiliza o formulário-->
        <!-- FORM  - tag semântica que indica que é um formulário. Atributos: METHOD: com enviar os dados (get ou post), ACTION: para onde enviar os dados -->
        <form class="event-form"> 
            <h2>INSCRIÇÃO TECH</h2>
            
            <div class="form-group">
                <label for="nome">Nome Completo</label> <!--FOR: Para indicar qual input é pra ele-->
                <input type="text" id="nome" placeholder="Digite seu nome" required/> <!--Usar ID para conectar ele com a label. Required: Campo obrigatório-->
            </div>
            <div class="form-group">
                <label for="email">E-mail</label> 
                <input type="email" id="email" placeholder="seu@email.com"/>
            </div>
            <div class="form-group">
                <label for="area">Área de Interesse</label> 
                <select id="area"> <!--Abre o select. Informar as opções-->
                    <option value="">Selecionar</option>
                    <option value="frontend">Front-end</option>
                    <option value="backend">Back-end</option>
                    <option value="design">UI/UX Design</option>
                </select>
            </div>
            <div class="form-group">
                <label for="msg">Por que quer participar</label>
                <textarea id="msg" rows="4"></textarea> <!-- Permite entrada de múltiplas linhas (rows)-->
            </div>
                <button type="submit">Enviar Inscrição</button>
        </form>
    </div>
</body>
</html>
